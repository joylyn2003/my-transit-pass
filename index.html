<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Transit Pass">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <title>Transit Pass</title>
    <style>
        :root {
            --card-bg: #9d375c;
            --page-bg: #ffffff;
            --yellow-text: #fcfc08;
            --button-color: #a791d1;
            --nav-circle-active: #56d1d2;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--page-bg);
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height - handles iOS address bar */
            display: flex;
            flex-direction: column;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            
            color: #333;
            font-size: 28px;
            background-color: var(--page-bg);
            flex-shrink: 0;
        }

        .pass-card {
            background-color: var(--card-bg);
            width: 92%;
            margin: 8px auto 0;
            border-radius: 24px 24px 0 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px 15px 20px;
            box-shadow: 0 4px 20px rgba(165, 63, 102, 0.3);
            color: white;
            overflow: hidden;
            min-height: 0; /* Important: allows flex child to shrink */
        }

        .ride-count { font-size: 18px; margin-bottom: 15px; margin-top: 20px; opacity: 0.9; font-weight: 400; }
        .date { font-size: 28px; font-weight: 700; margin-bottom: 20px; }
        .time { font-size: 25px; font-weight: 700; margin-bottom: 20px; }

        .agency {
            color: var(--yellow-text);
            font-size: 30px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .route { font-size: 18px; margin-bottom: 70px; opacity: 0.9; font-weight: 400; }

        .video-wrapper {
            width: 90%;
            overflow: hidden;
            margin-bottom: 16px;
            border-radius: 10px;
            height: 130px;
            flex-shrink: 0;
        }

        .bus-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Fallback illustration if video not found */
        .bus-illustration {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #c4708a 0%, #b05070 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        .expire-btn {
            background-color: var(--button-color);
            color: white;
            border: none;
            padding: 8px 10px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 30px;
            flex-shrink: 0;
            cursor: pointer;
            width: 35%;
        }

        .bottom-nav {
            background-color: #ffffff;
            height: 100px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            border-top: 1px solid #f0f0f0;
            position: relative;
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #000;
            gap: 4px;
        }

        .icon-circle {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

    <script>
        // Register service worker for PWA standalone mode
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        function updateClock() {
            const clock = document.getElementById('live-clock');
            const date = document.getElementById('live-date');
            const now = new Date();
            clock.textContent = now.toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' });
            date.textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: '2-digit', year: 'numeric' }).replace(/,/g, '');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
